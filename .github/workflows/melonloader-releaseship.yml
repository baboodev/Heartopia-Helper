name: MelonLoader ReleaseShip

on:
  push:
    branches:
      - main
      - master
    paths:
      - "buddy/**"
      - "ci/**"
      - ".github/workflows/melonloader-releaseship.yml"
    tags:
      - "v*"
  pull_request:
    paths:
      - "buddy/**"
      - "ci/**"
      - ".github/workflows/melonloader-releaseship.yml"
  workflow_dispatch:
    inputs:
      deps_url:
        description: Optional override URL for melonloader-ci-deps.zip
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Restore MelonLoader build dependencies
        shell: pwsh
        env:
          DEPS_URL_SECRET: ${{ secrets.MELONLOADER_CI_DEPS_URL }}
          DEPS_URL_INPUT: ${{ github.event.inputs.deps_url }}
        run: |
          $ErrorActionPreference = "Stop"
          $depsRoot = Join-Path $env:GITHUB_WORKSPACE "ci\heartopia"
          $zipPath = Join-Path $env:RUNNER_TEMP "melonloader-ci-deps.zip"
          $depsUrl = if ($env:DEPS_URL_INPUT) { $env:DEPS_URL_INPUT } else { $env:DEPS_URL_SECRET }

          if (-not $depsUrl) {
            $release = Invoke-RestMethod `
              -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/deps" `
              -Headers @{ "User-Agent" = "Heartopia-Helper-CI" }
            $asset = $release.assets | Where-Object { $_.name -eq "melonloader-ci-deps.zip" } | Select-Object -First 1
            if ($asset) {
              $depsUrl = $asset.browser_download_url
            }
          }

          if (-not $depsUrl) {
            throw @"
          MelonLoader CI dependencies are not configured.
          1. Run: pwsh ci/prepare-melonloader-deps.ps1 -HeartopiaDir '<Game>'
          2. Upload ci/melonloader-ci-deps.zip to the GitHub release tagged deps, or
          3. Set repository secret MELONLOADER_CI_DEPS_URL to a direct download URL.
          "@
          }

          Write-Host "Downloading build dependencies..."
          Invoke-WebRequest -Uri $depsUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $depsRoot -Force

          $required = @(
            "MelonLoader\net6\MelonLoader.dll",
            "MelonLoader\Il2CppAssemblies\Assembly-CSharp.dll",
            "MelonLoader\Il2CppAssemblies\Il2CppClient.dll"
          )
          foreach ($rel in $required) {
            $path = Join-Path $depsRoot $rel
            if (-not (Test-Path $path)) {
              throw "Dependency archive is missing required file: $rel"
            }
          }

      - name: Build ReleaseShip (MelonLoader)
        shell: pwsh
        run: |
          dotnet build buddy/buddy.csproj `
            -c ReleaseShip `
            -p:Loader=MelonLoader `
            -p:HeartopiaDir="${{ github.workspace }}\ci\heartopia" `
            -p:ContinuousIntegrationBuild=true `
            --nologo

      - name: Upload helper.dll artifact
        uses: actions/upload-artifact@v4
        with:
          name: helper-melonloader-releaseship
          path: buddy/bin/MelonLoader/ReleaseShip/helper.dll
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" `
            --title "${{ github.ref_name }}" `
            --generate-notes `
            "buddy/bin/MelonLoader/ReleaseShip/helper.dll"
